name: Build RG35XXH Controller Firmware

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git wget flex bison bc \
            libssl-dev device-tree-compiler python3 gcc-aarch64-linux-gnu \
            u-boot-tools cpio rsync unzip
      
      - name: Show directory structure
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Files in root ==="
          ls -la
          echo "=== Package directory ==="
          ls -la package/ || echo "Package directory missing"
          echo "=== Controller source ==="
          ls -la package/rg35xxh-controller/src/ || echo "Controller source missing"
      
      - name: Make build.sh executable
        run: chmod +x build.sh
      
      - name: Create Buildroot config
        run: |
          # Create configs directory
          mkdir -p buildroot/configs
          # Create the defconfig file
          cat > buildroot/configs/rg35xxh_defconfig << 'EOF'
          BR2_aarch64=y
          BR2_cortex_a53=y
          BR2_PACKAGE_HOST_LINUX_HEADERS=y
          BR2_LINUX_KERNEL=y
          BR2_LINUX_KERNEL_CUSTOM_VERSION=y
          BR2_LINUX_KERNEL_CUSTOM_VERSION_VALUE="6.1.31"
          BR2_LINUX_KERNEL_USE_DEFCONFIG=y
          BR2_LINUX_KERNEL_DEFCONFIG="sunxi"
          BR2_TARGET_ROOTFS_EXT2=y
          BR2_TARGET_ROOTFS_EXT2_4=y
          BR2_TARGET_ROOTFS_EXT2_SIZE="512M"
          BR2_PACKAGE_BLUEZ5_UTILS=y
          BR2_PACKAGE_LIBEVDEV=y
          BR2_PACKAGE_LIBUSB=y
          BR2_PACKAGE_ALSA_LIB=y
          BR2_PACKAGE_SDL2=y
          EOF
          # Show that file was created
          ls -la buildroot/configs/
      
      - name: Run build
        run: |
          cd buildroot
          make rg35xxh_defconfig
          make -j$(nproc)
      
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: rg35xxh-firmware
          path: buildroot/output/images/sdcard.img
