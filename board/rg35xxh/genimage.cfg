image boot.vfat {
    vfat {
        files = {
            "boot.scr",
            "sun50i-h700-rg35xxh.dtb",
            "Image"
        }
    }
    size = 64M
}

image sdcard.img {
    hdimage {
        partition-table-type = "mbr"
    }

    partition spl {
        in-partition-table = "false"
        image = "sunxi-spl.bin"
        offset = 8K
    }

    partition u-boot {
        in-partition-table = "false"
        image = "u-boot.itb"
        offset = 40K
    }

    partition boot {
        partition-type = 0xC
        bootable = "true"
        image = "boot.vfat"
        offset = 4M
        size = 64M
    }

    partition rootfs {
        partition-type = 0x83
        image = "rootfs.ext4"
        offset = 68M
    }
}